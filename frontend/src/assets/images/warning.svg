<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="-2 -2 28 28">
  <style>
    /* The core drawing animation */
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    /* The blink effect for the warning sign after it draws */
    @keyframes blink {
      0%, 100% { stroke: currentColor; stroke-width: 1.5px; }
      50% { stroke: #ff0000; stroke-width: 2px; }
    }

    /* Apply a massive dash array to all paths so they start hidden */
    path {
      stroke-dasharray: 150;
      stroke-dashoffset: 150;
    }

    /* Draw the envelope over 2 seconds */
    .envelope path {
      animation: draw 2s ease-in-out forwards;
    }

    /* Draw the warning sign over 1.5 seconds, but delay it by 1 second so it traces after the mail */
    .warning-sign path {
      animation: draw 1.5s ease-in-out 1s forwards;
    }

    /* Start the red blinking alert on the warning sign after everything is done drawing (at 2.5s) */
    .warning-sign {
      animation: blink 1.5s infinite step-end 2.5s;
    }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <g class="envelope">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 15.75h-7.5a1.5 1.5 0 0 1-1.5-1.5v-12a1.5 1.5 0 0 1 1.5-1.5h18a1.5 1.5 0 0 1 1.5 1.5v8.25"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="m21.411 1.3l-8.144 6.264a3.31 3.31 0 0 1-4.034 0L1.089 1.3"/>
    </g>

    <g class="warning-sign">
      <path d="M17.25 21a.375.375 0 0 1 0-.75m0 .75a.375.375 0 0 0 0-.75"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 18v-3m5.813 5.682a1.773 1.773 0 0 1-1.587 2.568h-8.452a1.775 1.775 0 0 1-1.587-2.568l4.226-8.451a1.774 1.774 0 0 1 3.174 0z"/>
    </g>
  </g>
</svg>
